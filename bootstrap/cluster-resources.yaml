# cluster-resources: an ApplicationSet that manages cluster-scoped resources
# (Namespaces, CRDs, repositories, etc.) per target cluster. Belongs to the
# `default` project. Its git *files* generator reads every cluster-resources/*.json
# descriptor; each one produces an Application that syncs cluster-resources/<name>/
# to that cluster. The bundled `in-cluster.json` targets the cluster Argo CD runs in.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  generators:
    - git:
        repoURL: __GIT_REPO_URL__
        revision: HEAD
        files:
          - path: cluster-resources/*.json
  template:
    metadata:
      name: cluster-resources-{{name}}
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: __GIT_REPO_URL__
        path: cluster-resources/{{name}}
        targetRevision: HEAD
        directory:
          recurse: true
      destination:
        server: '{{server}}'
        namespace: argocd
      syncPolicy:
        automated:
          allowEmpty: true
          selfHeal: true
