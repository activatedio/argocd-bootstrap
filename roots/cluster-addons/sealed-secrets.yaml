# sealed-secrets — EXAMPLE cluster add-on, left COMMENTED OUT on purpose.
#
# This shows how you'd add an add-on that installs onto every connected cluster:
# a `clusters` generator fans the chart out to each registered cluster (including
# the in-cluster control plane), and the generated Applications run in the
# `cluster-addons` project. Uncomment to actually install sealed-secrets.
#
# apiVersion: argoproj.io/v1alpha1
# kind: ApplicationSet
# metadata:
#   name: sealed-secrets
#   namespace: argocd
# spec:
#   generators:
#     # Every cluster registered with Argo CD (incl. the in-cluster control plane).
#     - clusters: {}
#   template:
#     metadata:
#       name: 'sealed-secrets-{{name}}'
#       namespace: argocd
#       finalizers:
#         - resources-finalizer.argocd.argoproj.io
#     spec:
#       project: cluster-addons
#       source:
#         repoURL: https://bitnami-labs.github.io/sealed-secrets
#         chart: sealed-secrets
#         targetRevision: 2.17.4
#         helm:
#           releaseName: sealed-secrets
#       destination:
#         server: '{{server}}'
#         namespace: kube-system
#       syncPolicy:
#         automated:
#           prune: true
#           selfHeal: true
#         syncOptions:
#           - ServerSideApply=true
#           - CreateNamespace=true
